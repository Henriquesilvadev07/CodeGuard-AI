spring.application.name=CodeSnippet
# Conex„o com o Postgres (Mesmo servidor, banco diferente)
spring.datasource.url=jdbc:postgresql://localhost:5432/snippet_db
spring.datasource.username=postgres
spring.datasource.password=1234

# Driver e Dialeto
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Criar tabelas automaticamente (j· que vocÍ quer o CRUD b·sico agora)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
