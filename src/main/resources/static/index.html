<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGuard AI | Curator Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg: #f8fafc; --card-bg: #ffffff; --primary: #6366f1; --primary-hover: #4f46e5;
            --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --accent: #a855f7;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card-bg: #1e293b; --primary: #818cf8; --text-main: #f1f5f9;
            --text-muted: #94a3b8; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; min-height: 100vh; }

        .navbar { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        .glass-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: var(--text-muted); }

        input, textarea, select {
            width: 100%; padding: 0.8rem; border-radius: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text-main); outline: none; font-family: inherit;
        }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .btn { padding: 0.8rem 1.5rem; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }

        /* ABAS ESTILO PILLS MODERNO */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 2rem; background: var(--card-bg);
            padding: 6px; border-radius: 16px; border: 1px solid var(--border);
            width: fit-content; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .tab-btn {
            padding: 10px 22px; border: none; border-radius: 12px; cursor: pointer;
            color: var(--text-muted); font-weight: 700; font-size: 0.85rem; background: transparent;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        /* Grid de Snippets */
        .snippet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .snippet-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; position: relative; }

        code { background: #1e1e1e; color: #9cdcfe; padding: 1rem; border-radius: 10px; font-size: 0.8rem; display: block; overflow-x: auto; border: 1px solid #333; min-height: 60px; }
        .badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 800; text-transform: uppercase; }

        .REVISAO { background: #fef3c7; color: #92400e; }
        .APROVADO { background: #dcfce7; color: #166534; }
        .RECUSADO { background: #fee2e2; color: #991b1b; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 600px; padding: 2.5rem; border-radius: 24px; position: relative; animation: zoomIn 0.3s; }
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-muted); font-size: 1.5rem; }

        .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }
        .btn-icon { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-muted); cursor: pointer; }
        .btn-icon:hover { color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo"><i class="fas fa-microchip"></i> CodeGuard AI</div>
    <button class="btn-icon" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
</nav>

<div class="container">
    <div class="glass-card animate__animated animate__fadeIn">
        <h3 style="margin-bottom: 1.5rem">✨ Registrar Novo Snippet</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
            <div class="input-group">
                <label>Linguagem</label>
                <input type="text" id="newLang" placeholder="Java, Python...">
            </div>
            <div class="input-group">
                <label>Status Inicial</label>
                <select id="newStatus">
                    <option value="REVISAO">Revisão</option>
                    <option value="APROVADO">Aprovar Direto</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Código Gerado</label>
            <textarea id="newCode" rows="3" placeholder="Insira o código aqui..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="criar()"><i class="fas fa-plus"></i> Adicionar à Fila</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setTab('REVISAO', this)">🕒 Em Revisão</button>
        <button class="tab-btn" onclick="setTab('APROVADO', this)">✅ Aprovados</button>
        <button class="tab-btn" onclick="setTab('RECUSADO', this)">❌ Recusados</button>
    </div>

    <div id="lista" class="snippet-grid"></div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModal()">&times;</span>
        <h3 style="margin-bottom: 1.5rem">🛠 Revisar Snippet #<span id="editIdDisplay"></span></h3>

        <input type="hidden" id="editId">
        <div class="input-group">
            <label>Código IA</label>
            <textarea id="editCode" rows="5"></textarea>
        </div>
        <div class="input-group">
            <label>Análise / Revisão Técnica</label>
            <textarea id="editAnalise" rows="3"></textarea>
        </div>
        <div class="input-group">
            <label>Decisão Final</label>
            <select id="editStatus">
                <option value="REVISAO">Manter em Revisão</option>
                <option value="APROVADO">Aprovar Código</option>
                <option value="RECUSADO">Recusar Código</option>
            </select>
        </div>
        <button class="btn btn-primary" style="width: 100%" onclick="salvarEdicao()">
            <i class="fas fa-save"></i> Atualizar e Mover
        </button>
    </div>
</div>

<script>
    const API = "http://localhost:8080/api";
    const API_TODOS = "http://localhost:8080/api/Todos"; // Seu novo endpoint GetMapping
    let snippetsCache = [];
    let abaAtual = 'REVISAO';

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
    }

    async function listar() {
        try {
            const res = await fetch(API_TODOS);
            snippetsCache = await res.json();
            render();
        } catch (err) {
            console.error("Erro ao buscar dados do back-end:", err);
        }
    }

    function render() {
        const grid = document.getElementById('lista');
        grid.innerHTML = '';

        // Filtra os dados com base na aba selecionada
        const filtrados = snippetsCache.filter(s => s.status === abaAtual);

        if(filtrados.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted)">Nenhum item em ${abaAtual.toLowerCase()}.</div>`;
            return;
        }

        filtrados.forEach(s => {
            grid.innerHTML += `
                <div class="snippet-card animate__animated animate__fadeInUp">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="badge ${s.status}">${s.linguagem}</span>
                        <span style="font-size: 0.7rem; color: var(--text-muted)">#${s.id}</span>
                    </div>
                    <code>${s.codigoIA.replace(/</g, "&lt;")}</code>
                    <p style="font-size: 0.8rem;"><strong>Review:</strong> ${s.analise || 'Aguardando curadoria...'}</p>
                    <div class="actions">
                        <button class="btn-icon" onclick="abrirModal(${s.id})"><i class="fas fa-pen-nib"></i></button>
                        <button class="btn-icon" style="color: #ef4444" onclick="deletar(${s.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });
    }

    function setTab(status, btn) {
        abaAtual = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    async function criar() {
        const data = {
            linguagem: document.getElementById('newLang').value,
            codigoIA: document.getElementById('newCode').value,
            status: document.getElementById('newStatus').value,
            analise: "Aguardando curadoria"
        };
        await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        document.getElementById('newCode').value = '';
        document.getElementById('newLang').value = '';
        listar();
    }

    function abrirModal(id) {
        const s = snippetsCache.find(item => item.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('editIdDisplay').innerText = s.id;
        document.getElementById('editCode').value = s.codigoIA;
        document.getElementById('editAnalise').value = s.analise || '';
        document.getElementById('editStatus').value = s.status;
        document.getElementById('editModal').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('editModal').style.display = 'none'; }

    async function salvarEdicao() {
        const id = document.getElementById('editId').value;
        const sOriginal = snippetsCache.find(item => item.id == id);

        const data = {
            id: parseInt(id),
            linguagem: sOriginal.linguagem,
            codigoIA: document.getElementById('editCode').value,
            analise: document.getElementById('editAnalise').value,
            status: document.getElementById('editStatus').value
        };

        const response = await fetch(API, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if(response.ok) {
            fecharModal();
            // O segredo está aqui: baixar a lista nova antes de renderizar
            await listar();
        }
    }

    async function deletar(id) {
        if(confirm("Deseja apagar este registro?")) {
            await fetch(`${API}?id=${id}`, { method: 'DELETE' });
            listar();
        }
    }

    // Carga inicial
    listar();
</script>
</body>
</html>
